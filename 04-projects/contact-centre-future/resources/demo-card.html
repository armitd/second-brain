<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belron Contact Centre — Agent Status</title>
  <style>
    /* Tokens from DESIGN.md */
    :root {
      --color-primary:  #e13a2b;
      --color-yellow:   #ffdd00;
      --color-neutral:  #575756;
      --color-white:    #ffffff;
      --color-teal:     #02ab93;
      --spacing-xs:     4px;
      --spacing-sm:     8px;
      --spacing-md:     16px;
      --spacing-lg:     24px;
      --spacing-xl:     48px;
      --font-stack:     "Helvetica Neue", Arial, sans-serif;
    }

    body {
      font-family: var(--font-stack);
      background: var(--color-white);
      color: var(--color-neutral);
      padding: var(--spacing-xl);
      margin: 0;
    }

    /* Belron angle — 34° clip on top-right corner */
    .belron-card {
      background: var(--color-white);
      border: 1px solid #e0e0e0;
      padding: var(--spacing-lg);
      max-width: 360px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 48px) 0, 100% 48px, 100% 100%, 0 100%);
    }

    /* Yellow accent stripe — right edge */
    .belron-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 3px;
      background: var(--color-yellow);
    }

    .card-header {
      background: var(--color-primary);
      color: var(--color-white);
      margin: calc(-1 * var(--spacing-lg));
      margin-bottom: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-lg);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .agent-name {
      font-weight: 700;
      font-size: 18px;
      line-height: 1.1;
      color: var(--color-neutral);
      margin-bottom: var(--spacing-xs);
    }

    .agent-role {
      font-weight: 300;
      font-size: 13px;
      color: var(--color-neutral);
      margin-bottom: var(--spacing-md);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
      font-size: 13px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.available  { background: var(--color-teal); }
    .status-dot.busy       { background: var(--color-primary); }
    .status-dot.away       { background: var(--color-yellow); }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: var(--spacing-xs) 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .metric-value {
      font-weight: 700;
      color: var(--color-primary);
    }

    .btn {
      display: inline-block;
      padding: var(--spacing-sm) var(--spacing-lg);
      font-family: var(--font-stack);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      border: none;
      margin-top: var(--spacing-md);
      margin-right: var(--spacing-sm);
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-white);
    }

    .btn-secondary {
      background: var(--color-yellow);
      color: var(--color-neutral);
    }
  </style>
</head>
<body>

  <div class="belron-card">
    <div class="card-header">Contact Centre · Live Agent</div>

    <div class="agent-name">Sarah Mitchell</div>
    <div class="agent-role">Customer Experience Advisor · Team Autoglass UK</div>

    <div class="status-row">
      <div class="status-dot available"></div>
      <span>Available</span>
    </div>

    <div class="metric">
      <span>Calls today</span>
      <span class="metric-value">24</span>
    </div>
    <div class="metric">
      <span>Avg handle time</span>
      <span class="metric-value">4m 32s</span>
    </div>
    <div class="metric">
      <span>CSAT score</span>
      <span class="metric-value">4.8 / 5</span>
    </div>

    <button class="btn btn-primary">Assign Call</button>
    <button class="btn btn-secondary">View History</button>
  </div>

</body>
</html>
